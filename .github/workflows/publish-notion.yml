---
name: Publish documentation to Notion

on:
  push:
    branches: [main]

# Run this only once at a time to avoid conflicts with Notion.
concurrency:
  group: ci
  cancel-in-progress: false

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    # Use dedicated environment so NOTION_TOKEN is scoped per zizmor recommendations.
    environment: notion

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build sample documentation
        run: |
          rm -rf ./build-sample
          uv run --extra=sample sphinx-build -W -b notion sample ./build-sample

      - name: Publish sample to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_SAMPLE_PAGE_ID: ${{ vars.NOTION_SAMPLE_PAGE_ID }}
        run: |
          uv run --all-extras notion-upload \
            --parent-page-id "$NOTION_SAMPLE_PAGE_ID" \
            --file "./build-sample/index.json" \
            --title "Sphinx-Notionbuilder Sample" \
            --icon "🐍"

      - name: Build sample_warnings documentation
        run: |
          rm -rf ./build-sample_warnings
          uv run --extra=sample sphinx-build -W -b notion sample_warnings ./build-sample_warnings

      - name: Publish sample_warnings to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_SAMPLE_PAGE_ID: ${{ vars.NOTION_SAMPLE_PAGE_ID }}
        run: |
          uv run --all-extras notion-upload \
            --parent-page-id "$NOTION_SAMPLE_PAGE_ID" \
            --file "./build-sample_warnings/index.json" \
            --title "Sphinx-Notionbuilder Suppressed Warnings Sample" \
            --icon "🐍"
